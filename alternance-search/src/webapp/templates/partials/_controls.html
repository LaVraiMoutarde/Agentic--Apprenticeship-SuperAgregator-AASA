<!-- partials/_controls.html — boutons de contrôle -->
<section class="card card-controls">
    <h2 class="card-title">
        <i class="fa-solid fa-sliders"></i> Controls
    </h2>
    <div class="controls-grid">
        <button id="btn-scrape" class="btn btn-primary">
            <i class="fa-solid fa-play"></i> Start Scraping
        </button>
        <button id="btn-llm" class="btn btn-secondary">
            <i class="fa-solid fa-brain"></i> Run LLM Scoring
        </button>
        <button id="btn-export" class="btn btn-outline">
            <i class="fa-solid fa-file-excel"></i> Export Excel
        </button>
        <button id="btn-clear-db" class="btn btn-outline btn-danger" style="border-color:#fecaca;color:var(--color-danger);">
            <i class="fa-solid fa-trash-can"></i> Clear DB
        </button>
        <a href="/offers" class="btn btn-outline" style="text-decoration:none;justify-content:center;">
            <i class="fa-solid fa-database"></i> Voir la DB
        </a>
        <button id="btn-build-index" class="btn btn-outline" style="border-color:#c7d2fe;color:var(--color-secondary);">
            <i class="fa-solid fa-cubes"></i> <span id="btn-index-text">Build Index</span>
        </button>
        <button id="btn-feedback-reset" class="btn btn-outline btn-sm" style="display:none;border-color:#fef9c3;color:#a16207;font-size:11px;" onclick="resetFeedback()">
            <i class="fa-solid fa-rotate-left"></i> <span id="btn-feedback-text">Pondération</span>
        </button>
    </div>
</section>
