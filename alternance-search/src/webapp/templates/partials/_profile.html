<!-- partials/_profile.html — Candidate Profile (Markdown persistant) -->
<section class="card card-profile">
    <h2 class="card-title">
        <i class="fa-solid fa-user-graduate"></i> Candidate Profile
        <span class="card-badge" id="profile-session-badge">—</span>
    </h2>

    <!-- ══════════════════════════════════════════════════════════════ -->
    <!-- PROFILE EDITOR — Markdown textarea                            -->
    <!-- ══════════════════════════════════════════════════════════════ -->
    <div class="profile-editor" id="profile-editor">
        <div class="profile-editor-header">
            <h3><i class="fa-solid fa-pen-to-square"></i> Profil (.md)</h3>
            <div style="display:flex;align-items:center;gap:10px;">
                <span class="editor-hint">Sauvegarde dans data/profile_candidat.md</span>
                <button class="btn-reset-link" onclick="resetProfile()" title="Reinitialiser">🗑</button>
            </div>
        </div>

        <div class="editor-md-area">
            <textarea id="edit-profile-md" class="editor-md-textarea"
                      rows="22" spellcheck="true"
                      placeholder="# Profil Candidat&#10;&#10;## Poste recherche&#10;...&#10;&#10;Ecris ou colle ton profil ici."></textarea>
        </div>

        <div class="editor-actions">
            <button class="btn btn-primary btn-sm" id="btn-apply-manual" onclick="applyManualProfile()">
                <i class="fa-solid fa-floppy-disk"></i> Appliquer
            </button>
            <button class="btn btn-outline btn-sm" id="btn-generate-terms" onclick="generateSearchTerms()"
                    title="Generer des termes pour les criteres de recherche">
                <i class="fa-solid fa-wand-magic-sparkles"></i> → Criteres
            </button>
        </div>
    </div>

</section>
