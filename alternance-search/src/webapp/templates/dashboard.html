{% extends "base.html" %}

{# ── SCRIPTS (loaded at end of body via base.html) ──────────────── #}
{% block scripts %}
<script>
// ═══════════════════════════════════════════════════════════════════
// Dashboard JS — polling, fetch, UI updates
// ═══════════════════════════════════════════════════════════════════

const $ = (sel) => document.querySelector(sel);
const API = '/api';

// ── State ──────────────────────────────────────────────────────────
let pollTimer = null;
let isScraping = false;
let isScoring = false;

// ── Results Controls ─────────────────────────────────────────────
function onResultsTopChange() {
    const slider = $('#results-top-slider');
    const label = $('#results-top-value');
    if (slider && label) {
        label.textContent = slider.value;
    }
    loadResults();
}

function getResultsTop() {
    const slider = $('#results-top-slider');
    return slider ? parseInt(slider.value) || 50 : 50;
}

function getSortMode() {
    const sel = $('#results-sort-mode');
    return sel ? sel.value : 'hybride';
}

// ── Init ───────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    loadStatus();
    loadResults();
    pollTimer = setInterval(loadStatus, 8000);

    // Bind controls
    $('#btn-scrape').addEventListener('click', runScrape);
    $('#btn-llm').addEventListener('click', runLLM);
    $('#btn-export').addEventListener('click', downloadExcel);
    $('#btn-clear-db').addEventListener('click', clearDatabase);
    $('#btn-build-index').addEventListener('click', buildIndex);

    // Init sliders display
    updateLLMCandidates();
    onResultsTopChange();

    // Check index + feedback status
    checkIndexStatus();
    checkFeedbackStatus();

    // Load favorites count
    loadFavCount();

        // LLM config
        $('#btn-save-llm').addEventListener('click', saveLLMConfig);
        $('#btn-test-llm').addEventListener('click', testLLMConnection);
        $('#llm-provider').addEventListener('change', onLLMProviderChange);
        loadLLMConfig();
});

async function apiGet(path) {
    const r = await fetch(API + path);
    if (!r.ok) throw new Error(await r.text());
    return r.json();
}

async function apiPost(path, body) {
    const r = await fetch(API + path, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
}

// ── Status ─────────────────────────────────────────────────────────
async function loadStatus() {
    try {
        const s = await apiGet('/status');
        // Header
        $('#total-offers').textContent = s.total_offers || 0;
        $('#last-scrape').textContent = s.last_scrape || '—';
        $('#scrapers-count').textContent = s.scrapers_count || 0;

        // Status dot
        const dot = $('#status-dot');
        const txt = $('#status-text');
        if (s.active_jobs > 0) {
            dot.className = 'status-dot running';
            txt.textContent = '⚡ Running (' + s.active_jobs + ' jobs)';
        } else if ((s.total_offers || 0) === 0) {
            dot.className = 'status-dot';
            txt.textContent = '⚫ Idle';
        } else {
            dot.className = 'status-dot active';
            txt.textContent = '🟢 Ready';
        }

        // Profile display via chat_profile from status
        if (s.chat_profile && s.chat_profile.has_content) {
            const ta = document.getElementById('edit-profile-md');
            if (ta && s.chat_profile.profile_md && !ta.value.trim()) {
                ta.value = s.chat_profile.profile_md;
            }
        }

        // Jobs
        if (s.jobs && s.jobs.length > 0) {
            const latest = s.jobs[0];
            updateLogs(latest);
        }
    } catch(e) {
        console.error('Status error:', e);
    }
}

// ── Results ────────────────────────────────────────────────────────
async function loadResults() {
    try {
        const top = getResultsTop();
        const sortMode = getSortMode();
        const data = await apiGet(`/results?top=${top}&sort_mode=${sortMode}`);
        const tbody = $('#results-tbody');

        // Update mode badge
        const modeBadge = $('#results-mode-badge');
        if (modeBadge) {
            const modeLabels = { hybride: '📐 hybride', index: '📏 index', llm: '🧠 LLM', date: '📅 date' };
            modeBadge.textContent = data.mode ? modeLabels[data.mode] || data.mode : '—';
            if (data.warning) {
                modeBadge.textContent += ' ⚠️';
                modeBadge.title = data.warning;
            }
        }

        const offers = data.results || [];
        if (!offers.length) {
            const msg = data.warning || 'Configurez vos critères et lancez Build Index.';
            tbody.innerHTML = `<tr><td colspan="7" class="empty-table">${escapeHtml(msg)}</td></tr>`;
        } else {
            // Charger les IDs des favoris
            let favIds = new Set();
            fetch(API + '/favorites').then(r => r.json()).then(d => {
                favIds = new Set(d.ids || []);
                renderResultsWithFavs(offers, sortMode, favIds);
            }).catch(() => renderResultsWithFavs(offers, sortMode, favIds));
        }
        const total = data.total_candidates || data.total_db || offers.length;
        const modeInfo = data.mode && data.mode !== 'date' ? ` (top ${offers.length} / ${total})` : '';
        $('#results-count').textContent = `${offers.length} offre${modeInfo}`;
    } catch(e) {
        console.error('Results error:', e);
        $('#results-tbody').innerHTML = '<tr><td colspan="7" class="empty-table">Erreur de chargement.</td></tr>';
    }
}

function renderResultsWithFavs(offers, sortMode, favIds) {
    const tbody = $('#results-tbody');
    tbody.innerHTML = offers.map((r, idx) => {
        // Choisir le score selon le mode
        let displayScore, scoreColor, scoreIcon, scoreLabel;
        if (sortMode === 'date') {
            displayScore = null;
            scoreLabel = '—';
            scoreColor = 'var(--color-text-muted)';
        } else {
            displayScore = r.hybrid_score || r.final_score || r.embedding_score;
            const pct = Math.round(displayScore * 100);
            if (sortMode === 'llm' && r.llm_score > 0) {
                scoreIcon = 'fa-brain';
                scoreColor = r.llm_score >= 0.7 ? '#22c55e' : r.llm_score >= 0.4 ? '#f59e0b' : '#ef4444';
                scoreLabel = `<i class="fa-solid ${scoreIcon}" style="font-size:10px" title="LLM"></i> ${pct}%`;
            } else if (sortMode === 'index' || !r.llm_score || r.llm_score === 0) {
                scoreIcon = 'fa-vector-square';
                scoreColor = displayScore >= 0.7 ? '#3b82f6' : displayScore >= 0.4 ? '#6366f1' : '#8b9cf7';
                scoreLabel = `<i class="fa-solid ${scoreIcon}" style="font-size:10px" title="Embedding"></i> ${pct}%`;
            } else {
                scoreIcon = 'fa-brain';
                scoreColor = displayScore >= 0.7 ? '#22c55e' : displayScore >= 0.4 ? '#f59e0b' : '#ef4444';
                scoreLabel = `<i class="fa-solid ${scoreIcon}" style="font-size:10px" title="Hybride"></i> ${pct}%`;
            }
        }

        const isFav = favIds.has(r.id);
        const favIcon = isFav
            ? '<i class="fa-solid fa-star" style="color:#f59e0b;font-size:14px"></i>'
            : '<i class="fa-regular fa-star" style="color:#94a3b8;font-size:14px"></i>';
        const favTitle = isFav ? 'Retirer des favoris' : 'Ajouter aux favoris';

        const reviewIcon = r.has_review
            ? '<i class="fa-solid fa-robot" style="color:#22c55e;font-size:12px" title="Analyse LLM disponible"></i>'
            : '<i class="fa-solid fa-robot" style="color:#94a3b8;font-size:12px" title="Demander une analyse LLM"></i>';

        return `
        <tr>
            <td><button class="fav-btn" onclick="toggleFavorite(${r.id}, '${escapeHtml((r.title || '').replace(/'/g, "\\'"))}', '${escapeHtml((r.company || '').replace(/'/g, "\\'"))}', '${escapeHtml((r.location || '').replace(/'/g, "\\'"))}', '${escapeHtml((r.source || '').replace(/'/g, "\\'"))}', '${escapeHtml((r.url || '').replace(/'/g, "\\'"))}')" title="${favTitle}">${favIcon}</button></td>
            <td class="cell-title">
                <a href="${escapeHtml(r.url || '#')}" target="_blank" rel="noopener" onclick="trackClick(${r.id || idx}, '${escapeHtml((r.company || '').replace(/'/g, "\\'"))}', '${escapeHtml((r.source || '').replace(/'/g, "\\'"))}', '${escapeHtml((r.title || '').replace(/'/g, "\\'"))}')">${escapeHtml(r.title)}</a>
            </td>
            <td>${escapeHtml(r.company)}</td>
            <td>${escapeHtml(r.location)}</td>
            <td><span class="score-badge" style="background:${scoreColor}20;color:${scoreColor}">${scoreLabel}</span></td>
            <td><span class="source-tag source-${escapeHtml(r.source)}">${escapeHtml(r.source)}</span></td>
            <td><button class="review-btn" onclick="reviewOffer(${r.id})">${reviewIcon}</button></td>
        </tr>`;
    }).join('');
}

// ── Review LLM (single offer) ─────────────────────────────────────
let reviewLoading = {};

async function reviewOffer(offerId) {
    if (reviewLoading[offerId]) return;
    reviewLoading[offerId] = true;

    const modal = $('#review-modal');
    const body = $('#review-body');
    modal.style.display = 'flex';
    body.innerHTML = '<div style="text-align:center;padding:40px;"><i class="fa-solid fa-spinner fa-spin fa-2x" style="color:var(--color-primary)"></i><p style="margin-top:12px;">Analyse LLM en cours...</p></div>';

    try {
        const r = await fetch(API + '/llm/review/' + offerId, { method: 'POST' });
        if (!r.ok) throw new Error(await r.text());
        const data = await r.json();
        const rev = data.review;
        body.innerHTML = buildReviewHTML(rev, data.cached);
        // Recharger les résultats pour mettre à jour l'icône (has_review)
        loadResults();
    } catch(e) {
        body.innerHTML = '<div style="text-align:center;padding:40px;color:var(--color-danger);"><i class="fa-solid fa-triangle-exclamation fa-2x"></i><p style="margin-top:12px;">Erreur: ' + escapeHtml(e.message) + '</p></div>';
    } finally {
        reviewLoading[offerId] = false;
    }
}

function buildReviewHTML(rev, cached) {
    const cachedBadge = cached ? '<span style="font-size:11px;background:#dcfce7;color:#16a34a;padding:2px 8px;border-radius:9999px;">en cache</span>' : '';
    const riskColors = { stack: '#3b82f6', entreprise: '#f59e0b', mission: '#8b5cf6', localisation: '#ec4899', contrat: '#ef4444' };
    const riskIcons = { stack: '🛠', entreprise: '🏢', mission: '🎯', localisation: '📍', contrat: '📝' };

    return `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 style="margin:0;">🧠 Analyse LLM ${cachedBadge}</h3>
        </div>
        <div class="review-scores">
            <div class="review-score-card">
                <div class="review-score-value">${rev.global_score}</div>
                <div class="review-score-label">Global</div>
            </div>
            <div class="review-score-card">
                <div class="review-score-value">${rev.technical_score}</div>
                <div class="review-score-label">Technique</div>
            </div>
            <div class="review-score-card">
                <div class="review-score-value">${rev.profile_adequacy_score}</div>
                <div class="review-score-label">Adéquation</div>
            </div>
        </div>
        ${rev.explanation ? `<div class="review-section"><h4>💬 Explication</h4><p>${escapeHtml(rev.explanation)}</p></div>` : ''}
        ${(rev.strengths || []).length ? `<div class="review-section"><h4>✅ Forces</h4><ul>${rev.strengths.map(s => '<li>' + escapeHtml(s) + '</li>').join('')}</ul></div>` : ''}
        ${(rev.weaknesses || []).length ? `<div class="review-section"><h4>⚠️ Faiblesses</h4><ul>${rev.weaknesses.map(w => '<li>' + escapeHtml(w) + '</li>').join('')}</ul></div>` : ''}
        ${(rev.risks || []).length ? `<div class="review-section"><h4>⚡ Risques</h4>${rev.risks.map(r => {
            const color = riskColors[r.type] || '#94a3b8';
            const icon = riskIcons[r.type] || '⚠️';
            return `<div class="review-risk" style="border-left:3px solid ${color}"><span>${icon}</span> <strong>${escapeHtml(r.type)}</strong> — ${escapeHtml(r.detail)}</div>`;
        }).join('')}</div>` : ''}
    `;
}

function closeReview() {
    $('#review-modal').style.display = 'none';
}

// ── Scrape ─────────────────────────────────────────────────────────
async function runScrape() {
    if (isScraping) return;
    isScraping = true;
    const btn = $('#btn-scrape');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Scraping...';

    try {
        const r = await apiPost('/scrape/run', {});
        $('#log-text').textContent = 'Scraping démarré (job: ' + r.job_id + ')\n';
        pollJobUntilDone(r.job_id, 'scrape', () => {
            isScraping = false;
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-play"></i> Start Scraping';
            loadResults();
        });
    } catch(e) {
        $('#log-text').textContent = 'Erreur: ' + e.message;
        isScraping = false;
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-play"></i> Start Scraping';
    }
}

// ── LLM Scoring ────────────────────────────────────────────────────
// ── LLM Candidates Slider ────────────────────────────────────────
function updateLLMCandidates() {
    const slider = $('#llm-candidates-slider');
    const label = $('#llm-candidates-value');
    if (slider && label) {
        label.textContent = slider.value;
        // Coloration : vert=peu risqué, orange=moyen, rouge=risqué
        const v = parseInt(slider.value);
        label.style.color = v <= 50 ? '#22c55e' : v <= 100 ? '#f59e0b' : '#ef4444';
    }
}

async function runLLM() {
    if (isScoring) return;
    isScoring = true;
    const btn = $('#btn-llm');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Scoring...';

    const maxCandidates = parseInt($('#llm-candidates-slider').value) || 50;

    try {
        const r = await apiPost('/llm/run', { max_candidates: maxCandidates });
        $('#log-text').textContent = 'LLM Scoring démarré (job: ' + r.job_id + ')\n';
        pollJobUntilDone(r.job_id, 'llm', () => {
            isScoring = false;
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-brain"></i> Run LLM Scoring';
            loadResults();
        });
    } catch(e) {
        $('#log-text').textContent = 'Erreur: ' + e.message;
        isScoring = false;
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-brain"></i> Run LLM Scoring';
    }
}

// ── Export ──────────────────────────────────────────────────────────
async function downloadExcel() {
    const btn = $('#btn-export');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Export...';
    try {
        window.open(API + '/export/excel', '_blank');
    } finally {
        setTimeout(() => {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-file-excel"></i> Export Excel';
        }, 1500);
    }
}

// ── Favorites ────────────────────────────────────────────────────────
let _favoriteIds = new Set();

async function toggleFavorite(id, title, company, location, source, url) {
    try {
        const r = await fetch(API + '/favorites/toggle', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id, title, company, location, source, url }),
        });
        if (!r.ok) throw new Error(await r.text());
        const data = await r.json();
        if (data.favorite) {
            _favoriteIds.add(id);
        } else {
            _favoriteIds.delete(id);
        }
        updateFavCount(data.count);
        loadResults();
    } catch(e) {
        console.error('Toggle favorite error:', e);
    }
}

async function exportFavorites() {
    const countEl = $('#favorites-count');
    const originalText = countEl ? countEl.textContent : '';
    try {
        // Vérifier s'il y a des favoris
        const r = await fetch(API + '/favorites');
        const data = await r.json();
        if (data.count === 0) {
            alert('Aucun favori à exporter. Ajoutez d\'abord des offres aux favoris en cliquant sur l\'icône étoile ⭐.');
            return;
        }
        window.open(API + '/favorites/export', '_blank');
    } catch(e) {
        console.error('Export favorites error:', e);
        alert('Erreur lors de l\'export des favoris.');
    }
}

async function loadFavCount() {
    try {
        const r = await fetch(API + '/favorites');
        const data = await r.json();
        updateFavCount(data.count);
        _favoriteIds = new Set(data.ids || []);
    } catch(e) {
        console.error('Load favorites count error:', e);
    }
}

function updateFavCount(count) {
    const el = $('#favorites-count');
    if (el) {
        el.textContent = count + ' favori' + (count > 1 ? 's' : '');
    }
}

// ── Clear Database ────────────────────────────────────────────────
async function clearDatabase() {
    if (!confirm('⚠️ Supprimer toutes les offres de la base de données ?\nCette action est irréversible.')) return;
    const btn = $('#btn-clear-db');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Clearing...';
    try {
        const r = await fetch(API + '/db/clear', { method: 'DELETE' });
        if (!r.ok) throw new Error(await r.text());
        const data = await r.json();
        $('#log-text').textContent = `🗑️ Base vidée : ${data.deleted_count} offre(s) supprimée(s)`;
        loadStatus();
        loadResults();
    } catch(e) {
        $('#log-text').textContent = 'Erreur clear DB: ' + e.message;
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-trash-can"></i> Clear DB';
    }
}

// ── Build Index ──────────────────────────────────────────────────
async function checkIndexStatus() {
    try {
        const r = await fetch(API + '/index/status');
        const data = await r.json();
        if (data.size > 0) {
            $('#btn-index-text').textContent = `Index: ${data.size} offres`;
            $('#btn-index-text').style.color = 'var(--color-accent)';
        } else {
            $('#btn-index-text').textContent = 'Build Index';
            $('#btn-index-text').style.color = 'var(--color-secondary)';
        }
    } catch(e) { console.error('Index status:', e); }
}

async function buildIndex() {
    if (!confirm('Construire l\'index sémantique ?\nCela peut prendre quelques dizaines de secondes.')) return;
    const btn = $('#btn-build-index'); btn.disabled = true;
    $('#btn-index-text').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Indexing...';
    try {
        const r = await fetch(API + '/index/build', { method: 'POST' });
        if (!r.ok) throw new Error(await r.text());
        const data = await r.json();
        pollJobUntilDone(data.job_id, 'index', () => { btn.disabled = false; checkIndexStatus(); });
    } catch(e) { $('#log-text').textContent = 'Erreur index: ' + e.message; btn.disabled = false; $('#btn-index-text').textContent = 'Build Index'; }
}

// ── Feedback Loop ────────────────────────────────────────────────
async function trackClick(id, company, source, title) {
    try {
        await fetch(API + '/feedback/click', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id, company, source, title }),
        });
        checkFeedbackStatus();
    } catch(e) { console.error('Track click:', e); }
}

async function checkFeedbackStatus() {
    try {
        const r = await fetch(API + '/feedback/stats');
        const data = await r.json();
        const btn = $('#btn-feedback-reset');
        const txt = $('#btn-feedback-text');
        if (data.total_clicks > 0) {
            btn.style.display = 'inline-flex';
            txt.textContent = `🎯 ${data.total_clicks} clic(s) · +${(data.boost_factor * 100).toFixed(0)}%/co`;
        } else {
            btn.style.display = 'none';
        }
    } catch(e) { /* silent */ }
}

async function resetFeedback() {
    if (!confirm('Réinitialiser la pondération par clics ?')) return;
    await fetch(API + '/feedback/reset', { method: 'DELETE' });
    checkFeedbackStatus();
    $('#log-text').textContent = '🧹 Pondération réinitialisée';
}

function addSearchTerm(val) {
    const term = (val || $('#search-term-input').value).trim();
    if (!term) return;
    _searchTerms.push(term);
    $('#search-term-input').value = '';
    $('#autocomplete-list').style.display = 'none';
    renderSearchTerms();
    saveCriteriaSilent(_searchTerms);  // ← persistence immédiate
}

function removeSearchTerm(idx) {
    _searchTerms.splice(idx, 1);
    renderSearchTerms();
    saveCriteriaSilent(_searchTerms);  // ← persistence immédiate
}

function renderSearchTerms() {
    const container = $('#search-terms-rows');
    const empty = $('#search-terms-empty');
    if (_searchTerms.length === 0) {
        container.innerHTML = '';
        empty.style.display = 'block';
    } else {
        empty.style.display = 'none';
        container.innerHTML = _searchTerms.map((t, i) => `
            <div class="search-term-row">
                <span class="st-index">${i + 1}</span>
                <span class="st-text">${escapeHtml(t)}</span>
                <button class="st-remove" onclick="removeSearchTerm(${i})" title="Supprimer">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        `).join('');
    }
}

// ── Autocomplete ──────────────────────────────────────────────────
function initAutocomplete() {
    const input = $('#search-term-input');
    const list = $('#autocomplete-list');
    if (!input || !list) return;

    // Fermer au clic en dehors
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.autocomplete-container')) {
            list.style.display = 'none';
        }
    });

    input.addEventListener('input', () => {
        const val = input.value.trim().toLowerCase();
        if (!val) {
            list.style.display = 'none';
            return;
        }
        // Chercher les suggestions qui matchent
        const matches = SEARCH_SUGGESTIONS.filter(s =>
            s.toLowerCase().includes(val)
        ).slice(0, 10); // max 10 suggestions

        if (matches.length === 0) {
            list.style.display = 'none';
            return;
        }

        list.innerHTML = matches.map(s =>
            `<div class="autocomplete-item" onclick="selectSuggestion('${escapeHtml(s)}')">
                <i class="fa-solid fa-briefcase"></i> ${escapeHtml(s)}
            </div>`
        ).join('');
        list.style.display = 'block';
    });

    // Enter → ajoute le terme (ou la première suggestion si l'input est vide ? Non, le terme tapé)
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            addSearchTerm();
        }
    });
}

function selectSuggestion(val) {
    addSearchTerm(val);
    $('#search-term-input').focus();
}

// ── Polling ────────────────────────────────────────────────────────
async function pollJobUntilDone(jobId, type, onDone) {
    const maxPolls = 120; // 120 * 2s = 4 min max
    let polls = 0;
    const interval = setInterval(async () => {
        polls++;
        try {
            const job = await apiGet('/jobs/' + jobId);
            updateLogs(job);
            if (job.status === 'done' || job.status === 'failed' || polls >= maxPolls) {
                clearInterval(interval);
                onDone();
            }
        } catch(e) {
            clearInterval(interval);
            onDone();
        }
    }, 2000);
}

function updateLogs(job) {
    const logEl = $('#log-text');
    let text = `[${job.type}] ${job.status}`;
    if (job.error) text += '\nERROR: ' + job.error;
    if (job.result) text += '\nResult: ' + JSON.stringify(job.result);
    if (job.logs && job.logs.length > 0) {
        text += '\n' + job.logs.join('\n');
    }
    logEl.textContent = text;

    if (job.error) {
        logEl.style.borderLeft = '3px solid var(--color-danger)';
    }
}

function onLLMProviderChange() {
    const provider = $('#llm-provider').value;
    const needsKey = !BS_NOKEY.includes(provider);
    $('#llm-key-group').style.display = needsKey ? 'block' : 'none';

    // Presets
    const presets = {
        ollama:    {model: 'qwen2.5:7b',     url: 'http://localhost:11434/v1'},
        picoclaw:  {model: 'picoclaw:latest', url: 'http://localhost:9090/v1'},
        openai:    {model: 'gpt-4o-mini',     url: 'https://api.openai.com/v1'},
        anthropic: {model: 'claude-3-haiku',  url: 'https://api.anthropic.com/v1'},
    };
    if (presets[provider]) {
        if (!$('#llm-model').value || $('#llm-model').dataset.auto === '1') {
            $('#llm-model').value = presets[provider].model;
            $('#llm-model').dataset.auto = '1';
        }
        if (!$('#llm-base-url').value || $('#llm-base-url').dataset.auto === '1') {
            $('#llm-base-url').value = presets[provider].url;
            $('#llm-base-url').dataset.auto = '1';
        }
    } else {
        $('#llm-model').dataset.auto = '0';
        $('#llm-base-url').dataset.auto = '0';
    }
}

}

function addBoostKeyword(val) {
    const term = (val || $('#boost-kw-input').value).trim();
    if (!term) return;
    if (_boostKeywords.includes(term)) return;
    _boostKeywords.push(term);
    $('#boost-kw-input').value = '';
    renderBoostKeywords();
}

function removeBoostKeyword(idx) {
    _boostKeywords.splice(idx, 1);
    renderBoostKeywords();
}

function renderBoostKeywords() {
    const container = $('#boost-keywords-tags');
    if (_boostKeywords.length === 0) {
        container.innerHTML = '<span class="boost-empty">Aucun mot-clé. Ajoutez-en pour booster les offres pertinentes.</span>';
    } else {
        container.innerHTML = _boostKeywords.map((kw, i) => `
            <span class="boost-tag">

    document.addEventListener('click', (e) => {
        const opt = e.target.closest('.boost-weight-opt');
        if (!opt) return;
        const group = opt.closest('#boost-weight-group');
        if (!group) return;
        group.querySelectorAll('.boost-weight-opt').forEach(el => el.classList.remove('active'));
        opt.classList.add('active');
        opt.querySelector('input').checked = true;
    });
});

function updateBoostWeightUI(weight) {
    document.querySelectorAll('.boost-weight-opt').forEach(opt => {
        opt.classList.toggle('active', opt.dataset.weight === weight);
    });
}

    if (data.boost_keywords && data.boost_keywords.length > 0) parts.push(data.boost_keywords.length + ' mot(s)-clé(s)');

    } else {

        badge.style.color = 'var(--color-text-muted)';
    }
